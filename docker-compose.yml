version: '3.8'

services:
caddy:
  build:
    context: .
    dockerfile: Dockerfile.caddy
  ports:
    - "80:80"
    - "443:443"
  networks:
    - web
  depends_on:
    - lovable-app
    networks:
      - web
    depends_on:
      - lovable-app

  lovable-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lovable-frontend
    restart: always
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
